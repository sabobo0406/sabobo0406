# ============================================
# Home Robot Configuration
# KTC MegPad 27" + Open Claw 家庭用ロボット
# ============================================

robot:
  name: "HomeBot"
  version: "0.1.0"

# --- Open Claw グリッパー設定 ---
open_claw:
  serial_port: "/dev/ttyUSB0"
  baud_rate: 115200
  # グリッパー開閉範囲 (mm)
  min_aperture: 0
  max_aperture: 100
  # サーボ角度範囲
  min_angle: 0
  max_angle: 180
  # 把持力制限 (N)
  max_grip_force: 10.0
  # アームのジョイント数
  arm_joints: 5
  # 各ジョイントの角度制限 [min, max]
  joint_limits:
    - [-90, 90]    # ベース回転
    - [0, 135]     # 肩
    - [0, 135]     # 肘
    - [-90, 90]    # 手首回転
    - [0, 180]     # グリッパー開閉

# --- 移動ベース設定 ---
mobile_base:
  type: "mecanum"  # mecanum / differential / omni
  serial_port: "/dev/ttyUSB1"
  baud_rate: 115200
  wheel_diameter: 0.1  # メートル
  wheel_base: 0.4      # メートル
  max_linear_speed: 0.5   # m/s
  max_angular_speed: 1.0  # rad/s
  # PIDパラメータ
  pid:
    kp: 1.0
    ki: 0.1
    kd: 0.05

# --- KTC MegPad ディスプレイ設定 ---
megpad_display:
  # ADB接続設定
  connection: "wifi"  # wifi / usb
  ip_address: "192.168.1.100"
  adb_port: 5555
  # 画面解像度
  width: 1920
  height: 1080
  # 表情アニメーション設定
  face_animation:
    fps: 30
    default_expression: "neutral"
    expressions:
      - "neutral"
      - "happy"
      - "thinking"
      - "surprised"
      - "sleeping"
      - "talking"

# --- センサー設定 ---
sensors:
  lidar:
    type: "rplidar_a1"
    serial_port: "/dev/ttyUSB2"
    baud_rate: 115200
    scan_range: 360  # degrees
    max_distance: 12.0  # meters
  depth_camera:
    type: "realsense_d435"
    width: 640
    height: 480
    fps: 30
  imu:
    type: "mpu6050"
    i2c_address: 0x68
  ultrasonic:
    count: 4
    pins: [17, 27, 22, 23]
    max_range: 4.0  # meters

# --- ナビゲーション設定 ---
navigation:
  map_resolution: 0.05  # meters per pixel
  obstacle_inflation: 0.3  # meters
  path_planning:
    algorithm: "a_star"  # a_star / rrt / dijkstra
    goal_tolerance: 0.1  # meters
  localization:
    method: "amcl"
    particle_count: 500

# --- タスク設定 ---
tasks:
  # 家庭内タスクの定義
  fetch_object:
    enabled: true
    max_object_weight: 1.0  # kg
  patrol:
    enabled: true
    interval: 3600  # seconds
  greeting:
    enabled: true
    detection_distance: 2.0  # meters
